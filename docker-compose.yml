services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transition_portal
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d transition_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@postgres:5432/transition_portal
      FRONTEND_ORIGIN: http://localhost:5173
      MOCK_INTEGRATIONS: "true"
      DEV_AUTH_ENABLED: "true"
      DEFAULT_TIMEZONE: Asia/Kolkata
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
